name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      # gradlew is not committed yet; use system gradle.
      # Once gradle wrapper is regenerated and committed, switch to ./gradlew.
      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon
