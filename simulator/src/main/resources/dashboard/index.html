<!DOCTYPE html>
<!--
  Rumor simulator dashboard. Single self-contained page: no CDN, no external
  assets, so it works fully offline. Vanilla JS + a canvas force-graph.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rumor Simulator</title>
<style>
  :root { --bg:#11151c; --panel:#1a212b; --line:#2c3744; --fg:#d6dde6; --muted:#7c8a9a;
          --accent:#4ea1ff; --good:#4ec77f; --bad:#ff5d5d; --warn:#ffb454; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.4 system-ui,sans-serif; background:var(--bg); color:var(--fg);
         display:grid; grid-template-columns:320px 1fr; height:100vh; }
  #sidebar { background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; padding:14px; }
  #main { display:flex; flex-direction:column; }
  #graph { flex:1; background:var(--bg); }
  h1 { font-size:15px; margin:0 0 12px; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
       margin:16px 0 6px; border-bottom:1px solid var(--line); padding-bottom:3px; }
  button { background:var(--line); color:var(--fg); border:0; border-radius:4px; padding:6px 10px;
           cursor:pointer; font-size:12px; transition:background .15s; }
  button:hover { background:#36475a; }
  button:active { background:var(--accent); color:#04111f; }
  button.primary { background:var(--accent); color:#04111f; font-weight:600; }
  /* Toggle state: Start lights up green while running, Stop lights up red while stopped. */
  button.active-on  { background:var(--good); color:#04111f; font-weight:600; }
  button.active-off { background:var(--bad);  color:#04111f; font-weight:600; }
  .controls { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .param { margin-bottom:9px; }
  .param label { display:flex; justify-content:space-between; color:var(--muted); margin-bottom:2px; }
  .param .val { color:var(--fg); font-variant-numeric:tabular-nums; }
  .param .row { display:flex; gap:5px; align-items:center; }
  .param input[type=range] { flex:1; }
  .param .dice { padding:2px 6px; font-size:11px; }
  #metrics { display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; padding:10px 14px;
             background:var(--panel); border-top:1px solid var(--line); }
  #metrics div { display:flex; justify-content:space-between; }
  #metrics span:last-child { color:var(--accent); font-variant-numeric:tabular-nums; }
  #status { font-size:11px; color:var(--muted); margin-bottom:10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .dot.on { background:var(--good); } .dot.off { background:var(--bad); }
</style>
</head>
<body>
<div id="sidebar">
  <h1>Rumor Simulator</h1>
  <div id="status"><span class="dot off"></span><span id="statusText">connecting…</span></div>
  <div class="controls">
    <button class="primary" id="btnStart">Start</button>
    <button id="btnStop">Stop</button>
    <button id="btnStep">Step</button>
    <button id="btnReset">Reset</button>
  </div>
  <div class="controls">
    <button id="btnRandom">Randomize all</button>
    <button id="btnReport" title="Snapshots the live dashboard sim (separate from scenarios)">Snapshot live sim</button>
  </div>
  <div id="params"></div>

  <h2>Scenarios</h2>
  <div class="controls" style="margin-bottom:6px;">
    <button id="btnRefreshScenarios">Refresh</button>
    <button id="btnUpload">Upload .json</button>
    <input id="uploadInput" type="file" accept=".json" multiple style="display:none;">
  </div>
  <div id="scenarioList" style="max-height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:4px;padding:6px;font-size:12px;"></div>
  <div class="controls" style="margin-top:6px;">
    <button id="btnRunSelected">Run selected</button>
    <button id="btnCancelRun" disabled>Cancel</button>
    <button id="btnDownloadZip" disabled>Download bundle</button>
  </div>
  <div id="scenarioStatus" style="margin-top:6px;font-size:12px;color:var(--muted);"></div>
</div>
<div id="main">
  <canvas id="graph"></canvas>
  <div id="metrics"></div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);

// ── Controls ────────────────────────────────────────────────────────────────
// Brief tactile flash so the user always sees the click was received, even
// when the resulting state change (e.g. running -> stopped) takes a tick to
// propagate over the WebSocket.
function flash(btn) {
  btn.style.transition = "none";
  btn.style.background = "#fff";
  btn.style.color = "#000";
  setTimeout(() => { btn.style.transition = ""; btn.style.background = ""; btn.style.color = ""; }, 120);
}
async function post(path, btn) {
  if (btn) flash(btn);
  return fetch(path, { method:"POST" });
}
$("btnStart").onclick  = e => post("/api/start", e.currentTarget);
$("btnStop").onclick   = e => post("/api/stop",  e.currentTarget);
$("btnStep").onclick   = e => post("/api/step",  e.currentTarget);
$("btnReset").onclick  = e => { post("/api/reset", e.currentTarget); nodeActivity.clear(); edgeActivity.clear(); };
$("btnRandom").onclick = e => post("/api/randomize", e.currentTarget).then(loadParams);
$("btnReport").onclick = e => { flash(e.currentTarget); window.location = "/api/report"; };

// ── Parameter sliders (auto-generated from /api/init) ───────────────────────
async function loadParams() {
  const init = await (await fetch("/api/init")).json();
  const byCat = {};
  init.params.forEach(p => (byCat[p.category] ??= []).push(p));
  const root = $("params");
  root.innerHTML = "";
  for (const [cat, list] of Object.entries(byCat)) {
    const h = document.createElement("h2");
    h.textContent = cat.replace("_", " ");
    root.appendChild(h);
    list.forEach(p => root.appendChild(paramRow(p)));
  }
}

function paramRow(p) {
  const wrap = document.createElement("div");
  wrap.className = "param";
  const isFloat = p.step < 1;
  wrap.innerHTML =
    `<label><span>${p.label}</span><span class="val"></span></label>
     <div class="row">
       <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.current}">
       <button class="dice" title="Randomize">⚄</button>
     </div>`;
  const range = wrap.querySelector("input");
  const val   = wrap.querySelector(".val");
  const show  = v => val.textContent = isFloat ? Number(v).toFixed(3) : v;
  show(p.current);
  range.oninput  = () => show(range.value);
  range.onchange = () => post(`/api/param/${p.id}?value=${range.value}`);
  wrap.querySelector(".dice").onclick = (e) =>
    post(`/api/randomize/${p.id}`, e.currentTarget).then(loadParams);
  return wrap;
}

// ── Metrics panel ───────────────────────────────────────────────────────────
function renderMetrics(s) {
  const m = s.metrics;
  const rows = [
    ["Running",        s.running ? "yes" : "no"],
    ["Sim time",       (s.simTimeMs / 1000).toFixed(1) + "s"],
    ["Nodes",          m.nodeCount],
    ["Edges",          m.edgeCount],
    ["Msgs / tick",    m.totalMsgsThisTick],
    ["Msgs total",     m.totalMessages],
    ["Total dropped",  m.totalDropped],
    ["Heap",           m.heapUsedMb + " / " + m.heapMaxMb + " MB"],
    ["Partitioned",    s.edges.filter(e => e.partitioned).length],
  ];
  $("metrics").innerHTML = rows
    .map(([k, v]) => `<div><span>${k}</span><span>${v}</span></div>`).join("");

  // Reflect running state on the buttons so it's obvious whether Start/Stop
  // had any effect — the user complaint was "I click Stop and nothing happens".
  $("btnStart").classList.toggle("active-on",  s.running);
  $("btnStop").classList.toggle("active-off", !s.running);
}

// ── Canvas: static layout + activity pulses ─────────────────────────────────
//
// No force simulation. Nodes are placed once on a fixed lattice the first
// time we see them and never move. Activity is shown via:
//   - node ring pulse when its messagesProcessed counter advances
//   - edge flash for ~600ms after it carried a message
// This keeps the layout legible and makes Start/Stop visibly do something
// (with no inertia, the moment we stop receiving WS updates everything freezes).
const canvas = $("graph"), ctx = canvas.getContext("2d");
let nodes = [], edges = [];
const layout = new Map();              // node index -> {x, y}
const nodeActivity = new Map();        // node index -> { lastProcessed, lastSeenAt }
const edgeActivity = new Map();        // "from-to"  -> wall-clock ms of last activity
const EDGE_FLASH_MS = 600;
const NODE_PULSE_MS = 500;

function resize() {
  canvas.width  = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  // Force a re-layout on resize so positions still make sense.
  layout.clear();
}
window.addEventListener("resize", resize);
resize();

function layoutNodes(list) {
  // Concentric rings: inner ring up to 12, then expanding rings of ~1.6× capacity.
  // Stable, deterministic positions based on index — no jitter, no movement.
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const maxR = Math.min(w, h) * 0.42;
  const n = list.length;
  if (n === 0) return;
  // Compute ring sizes so total capacity >= n.
  const rings = [];
  let cap = 0, ringIdx = 0;
  while (cap < n) {
    const size = ringIdx === 0 ? Math.min(12, n) : Math.floor(12 * Math.pow(1.6, ringIdx));
    rings.push(size);
    cap += size;
    ringIdx++;
  }
  // Place nodes ring by ring in index order.
  let placed = 0;
  for (let r = 0; r < rings.length; r++) {
    const ringR = (rings.length === 1) ? maxR * 0.6 : maxR * (0.25 + 0.75 * r / (rings.length - 1));
    const inThis = Math.min(rings[r], n - placed);
    for (let i = 0; i < inThis; i++) {
      const a = (i / inThis) * Math.PI * 2 - Math.PI / 2;
      const node = list[placed++];
      layout.set(node.index, { x: cx + Math.cos(a) * ringR, y: cy + Math.sin(a) * ringR });
    }
  }
}

function syncState(state) {
  nodes = state.nodes; edges = state.edges;
  // Re-layout if the node set changed (count or membership).
  const needLayout = nodes.length !== layout.size ||
                     nodes.some(n => !layout.has(n.index));
  if (needLayout) {
    layout.clear();
    layoutNodes(nodes);
  }
  // Detect per-node activity: messagesProcessed went up since last frame.
  const now = performance.now();
  for (const n of nodes) {
    const prev = nodeActivity.get(n.index);
    if (prev && n.messagesProcessed > prev.lastProcessed) {
      prev.lastSeenAt = now;
    }
    nodeActivity.set(n.index, {
      lastProcessed: n.messagesProcessed,
      lastSeenAt: prev?.lastSeenAt ?? -Infinity,
    });
  }
  // Edge activity: server tells us when each edge last carried traffic.
  // We translate sim-time activity into wall-clock flash windows.
  for (const e of edges) {
    if (e.lastActiveAtMs >= 0) {
      const key = e.from + "-" + e.to;
      const prevSimTime = edgeActivity.get(key)?.simTime ?? -1;
      if (e.lastActiveAtMs > prevSimTime) {
        edgeActivity.set(key, { simTime: e.lastActiveAtMs, wallTime: now });
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const now = performance.now();

  // Edges
  for (const e of edges) {
    const pa = layout.get(e.from), pb = layout.get(e.to);
    if (!pa || !pb) continue;
    const key = e.from + "-" + e.to;
    const act = edgeActivity.get(key);
    const sinceActive = act ? (now - act.wallTime) : Infinity;
    const flashing = sinceActive < EDGE_FLASH_MS;

    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    if (e.partitioned) {
      ctx.strokeStyle = "#3a3f47"; ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
    } else if (e.congested) {
      ctx.strokeStyle = "#ff5d5d"; ctx.setLineDash([]); ctx.lineWidth = 2;
    } else if (flashing) {
      const t = 1 - sinceActive / EDGE_FLASH_MS;
      ctx.strokeStyle = `rgba(78,161,255,${0.3 + 0.7 * t})`;
      ctx.setLineDash([]); ctx.lineWidth = 1 + t * 1.5;
    } else {
      ctx.strokeStyle = "#2c3744"; ctx.setLineDash([]); ctx.lineWidth = 1;
    }
    ctx.stroke();
    ctx.setLineDash([]); ctx.lineWidth = 1;
  }

  // Nodes
  for (const n of nodes) {
    const p = layout.get(n.index);
    if (!p) continue;
    const baseR = 5;
    const fill = n.queueDepth > 50 ? "#ff5d5d"
               : n.queueDepth > 15 ? "#ffb454" : "#4ea1ff";

    // Pulse ring if processed a message recently.
    const act = nodeActivity.get(n.index);
    const sinceActive = act ? (now - act.lastSeenAt) : Infinity;
    if (sinceActive < NODE_PULSE_MS) {
      const t = sinceActive / NODE_PULSE_MS;
      const ringR = baseR + 4 + t * 10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(78,199,127,${1 - t})`;
      ctx.lineWidth = 2 * (1 - t);
      ctx.stroke();
      ctx.lineWidth = 1;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, baseR, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ── WebSocket feed ──────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    $("status").querySelector(".dot").className = "dot on";
    $("statusText").textContent = "connected";
  };
  ws.onclose = () => {
    $("status").querySelector(".dot").className = "dot off";
    $("statusText").textContent = "disconnected — retrying…";
    setTimeout(connect, 1500);
  };
  ws.onmessage = ev => {
    const state = JSON.parse(ev.data);
    syncState(state);
    renderMetrics(state);
  };
}

// ── Scenario runner ─────────────────────────────────────────────────────────
async function loadScenarios() {
  const list = await fetch("/api/scenarios").then(r => r.json());
  const root = $("scenarioList");
  root.innerHTML = "";
  if (list.length === 0) {
    root.textContent = "(no scenarios — upload some .json files)";
    return;
  }
  list.forEach(entry => {
    const row = document.createElement("label");
    row.style.cssText = "display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = entry.name;
    cb.dataset.source = entry.source;
    row.appendChild(cb);
    const label = document.createElement("span");
    label.textContent = entry.name;
    if (entry.source === "UPLOADED") {
      label.style.color = "var(--accent)";
      label.title = "uploaded";
    }
    row.appendChild(label);
    root.appendChild(row);
  });
}
$("btnRefreshScenarios").onclick = e => { flash(e.currentTarget); loadScenarios(); };

$("btnUpload").onclick = () => $("uploadInput").click();
$("uploadInput").onchange = async ev => {
  const files = Array.from(ev.target.files);
  if (files.length === 0) return;
  const fd = new FormData();
  files.forEach(f => fd.append("file", f, f.name));
  const res = await fetch("/api/scenarios/upload", { method: "POST", body: fd });
  const body = await res.json();
  $("scenarioStatus").textContent = `uploaded: ${body.accepted.join(", ")}`;
  ev.target.value = "";
  loadScenarios();
};

let pollHandle = null;
$("btnRunSelected").onclick = async e => {
  flash(e.currentTarget);
  const selected = Array.from(document.querySelectorAll("#scenarioList input:checked")).map(cb => cb.value);
  if (selected.length === 0) {
    $("scenarioStatus").textContent = "select one or more scenarios first";
    return;
  }
  $("btnDownloadZip").disabled = true;
  $("btnCancelRun").disabled = false;
  const res = await fetch("/api/scenarios/run?names=" + encodeURIComponent(selected.join(",")), { method: "POST" });
  if (!res.ok) {
    $("scenarioStatus").textContent = "error: " + await res.text();
    $("btnCancelRun").disabled = true;
    return;
  }
  const { id } = await res.json();
  $("scenarioStatus").textContent = `running ${selected.length} scenario(s) — job ${id}`;
  if (pollHandle) clearInterval(pollHandle);
  pollHandle = setInterval(pollJob, 750);
};

$("btnCancelRun").onclick = async e => {
  flash(e.currentTarget);
  await fetch("/api/scenarios/cancel", { method: "POST" });
  $("scenarioStatus").textContent = "cancel requested — current scenario will finish first";
};

async function pollJob() {
  const r = await fetch("/api/scenarios/job").then(x => x.json());
  if (!r.id) return;
  const elapsed = ((r.finishedAtMs ?? Date.now()) - r.startedAtMs) / 1000;
  if (r.status === "RUNNING") {
    $("scenarioStatus").textContent = `running… ${elapsed.toFixed(1)}s elapsed (${r.selected.length} scenarios)`;
    $("btnCancelRun").disabled = false;
  } else {
    clearInterval(pollHandle); pollHandle = null;
    $("btnCancelRun").disabled = true;
    const tag = ({
      PASSED:    "✓ passed",
      FAILED:    "✗ assertions failed",
      ERROR:     "✗ error",
      CANCELLED: "● cancelled (partial bundle available)",
    })[r.status] ?? r.status;
    $("scenarioStatus").textContent = `${tag} in ${elapsed.toFixed(1)}s` + (r.error ? ` — ${r.error}` : "");
    $("btnDownloadZip").disabled = !r.hasZip;
  }
}

$("btnDownloadZip").onclick = async e => {
  flash(e.currentTarget);
  // Fetch + Blob path forces a download even if the browser would otherwise
  // try to navigate inline; works regardless of Content-Disposition support.
  const res = await fetch("/api/scenarios/job/zip");
  if (!res.ok) {
    $("scenarioStatus").textContent = "download failed: " + res.status;
    return;
  }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "rumor-scenarios.zip";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
};

// Recover state on page load: if a job from a prior session is finished and
// has a downloadable zip, light up the button so the user can grab it.
(async () => {
  const r = await fetch("/api/scenarios/job").then(x => x.json()).catch(() => null);
  if (r && r.id && r.status !== "RUNNING" && r.hasZip) {
    $("btnDownloadZip").disabled = false;
    $("scenarioStatus").textContent = `last run: ${r.status.toLowerCase()} — bundle ready`;
  } else if (r && r.status === "RUNNING") {
    pollHandle = setInterval(pollJob, 750);
    $("btnCancelRun").disabled = false;
  }
})();

loadParams();
loadScenarios();
connect();
</script>
</body>
</html>
